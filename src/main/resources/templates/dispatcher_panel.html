<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dispatcher Panel</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
        <h1>Dispatcher Panel</h1>
        <h2>Select Driver to View Statistics</h2>
        <div class="mb-3">
            <button id="downloadDatasetBtn" class="btn btn-success">Выгрузить датасет для обучения</button>
        </div>
        <table class="table table-bordered table-hover">
            <thead class="thead-light">
                <tr>
                    <th>Имя</th>
                    <th>ID</th>
                    <th>Общая оценка</th>
                    <th>Статистика</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="driver : ${driverInfos}">
                    <td th:text="${driver.driverName}">Driver Name</td>
                    <td th:text="${driver.driverId}">Driver ID</td>
                    <td>
                        <span class="text-success">Надёжный</span>
                    </td>
                    <td>
                        <a th:href="@{/dispatcher/driver/{driverId}(driverId=${driver.driverId})}" class="btn btn-primary btn-sm">Статистика</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
    // Кнопка для скачивания датасета
    const downloadBtn = document.getElementById('downloadDatasetBtn');
    if (downloadBtn) {
        downloadBtn.addEventListener('click', function() {
            fetch('/api/label-dataset')
                .then(resp => resp.json())
                .then(data => {
                    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'label_dataset.json';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
        });
    }
    </script>
</body>
</html>
