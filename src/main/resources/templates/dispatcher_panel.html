<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dispatcher Panel</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .dispatcher-card {
            max-width: 700px;
            margin: 60px auto 0 auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            border-radius: 16px;
        }
        .dispatcher-icon {
            font-size: 2.5rem;
            color: #198754;
        }
        .table thead th {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card dispatcher-card">
        <div class="card-body">
            <div class="text-center mb-3">
                <span class="dispatcher-icon">🛡️</span>
                <h2 class="mt-2 mb-3">Панель диспетчера</h2>
            </div>
            <div class="mb-3">
                <button id="downloadDatasetBtn" class="btn btn-success w-100">Выгрузить датасет для обучения</button>
            </div>
            <h5 class="mb-3 text-center">Выберите водителя для просмотра статистики</h5>
            <div class="table-responsive">
                <table class="table table-bordered table-hover mb-0">
                    <thead class="thead-light">
                        <tr>
                            <th>Имя</th>
                            <th>ID</th>
                            <th>Общая оценка</th>
                            <th>Статистика</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="driver : ${driverInfos}">
                            <td th:text="${driver.driverName}">Driver Name</td>
                            <td th:text="${driver.driverId}">Driver ID</td>
                            <td>
                                <span class="text-success">Надёжный</span>
                            </td>
                            <td>
                                <a th:href="@{/dispatcher/driver/{driverId}(driverId=${driver.driverId})}" class="btn btn-primary btn-sm">Статистика</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
// Кнопка для скачивания датасета
const downloadBtn = document.getElementById('downloadDatasetBtn');
if (downloadBtn) {
    downloadBtn.addEventListener('click', function() {
        fetch('/api/label-dataset')
            .then(resp => resp.json())
            .then(data => {
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'label_dataset.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
    });
}
</script>
</body>
</html>
