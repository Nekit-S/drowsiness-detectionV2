<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Driver Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-card {
            max-width: 400px;
            margin: 60px auto 0 auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            border-radius: 16px;
        }
        .login-icon {
            font-size: 2.5rem;
            color: #0d6efd;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card login-card">
        <div class="card-body">
            <div class="text-center mb-3">
                <span class="login-icon">🚗</span>
                <h2 class="mt-2 mb-3">Вход водителя</h2>
            </div>
            <form th:action="@{/driver/start}" method="post">
                <div class="mb-3">
                    <label for="driverName" class="form-label">Имя водителя</label>
                    <input type="text" class="form-control" id="driverName" name="driverName" required>
                </div>
                <div class="mb-3">
                    <label for="driverId" class="form-label">ID водителя (6 цифр)</label>
                    <input type="text" class="form-control" id="driverId" name="driverId" required pattern="\d{6}" title="Driver ID must be exactly 6 digits">
                </div>
                <div th:if="${error}" class="alert alert-danger text-center" role="alert">
                    <span th:text="${error}"></span>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-2">Начать мониторинг</button>
            </form>
            <div class="text-center mt-2">
                <a href="/dispatcher" class="btn btn-outline-secondary w-100">Войти как диспетчер</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
